<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brian Bors — Locations</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <style>
    :root {
      --bg: #0a0a0a;
      --text: #f5f5f5;
      --muted: #9a9a9a;
      --accent: #c8a96e;
      --line: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* NAV */
    header {
      position: fixed;
      width: 100%;
      top: 0; left: 0;
      padding: 18px 30px;
      border-bottom: 1px solid var(--line);
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      z-index: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 4px;
      font-size: 1.1rem;
      text-decoration: none;
      color: var(--text);
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 2px;
      margin-left: 30px;
      transition: color 0.3s;
      text-transform: uppercase;
    }

    nav a:hover, nav a.active { color: var(--text); }

    /* HERO */
    .page-hero {
      padding: 120px 30px 40px;
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 1px solid var(--line);
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 12vw, 9rem);
      line-height: 0.85;
      letter-spacing: 2px;
    }

    .page-desc {
      max-width: 340px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.9;
      padding-bottom: 6px;
    }

    /* MAP */
    #map-wrap {
      position: relative;
      width: 100%;
      height: calc(100vh - 80px);
      margin-top: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
    }

    /* Leaflet overrides */
    .leaflet-container {
      background: #0d0d0d;
      cursor: crosshair !important;
    }

    .leaflet-control-zoom {
      border: 1px solid var(--line) !important;
      background: rgba(10,10,10,0.9) !important;
    }

    .leaflet-control-zoom a {
      background: transparent !important;
      color: var(--muted) !important;
      border-bottom: 1px solid var(--line) !important;
      font-family: 'DM Mono', monospace !important;
    }

    .leaflet-control-zoom a:hover {
      color: var(--text) !important;
      background: rgba(255,255,255,0.05) !important;
    }

    .leaflet-control-attribution {
      background: rgba(10,10,10,0.7) !important;
      color: rgba(255,255,255,0.2) !important;
      font-size: 0.6rem !important;
    }

    .leaflet-control-attribution a { color: rgba(255,255,255,0.3) !important; }

    /* CUSTOM MARKER */
    .bors-marker {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 1px solid rgba(200,169,110,0.4);
      box-shadow: 0 0 0 4px rgba(200,169,110,0.12), 0 0 20px rgba(200,169,110,0.3);
      cursor: crosshair;
      transition: transform 0.2s;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .bors-marker:hover {
      transform: scale(1.4);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(200,169,110,0.12), 0 0 20px rgba(200,169,110,0.3); }
      50%       { box-shadow: 0 0 0 8px rgba(200,169,110,0.06), 0 0 30px rgba(200,169,110,0.5); }
    }

    /* POPUP */
    .leaflet-popup-content-wrapper {
      background: rgba(12,12,12,0.97) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8) !important;
      padding: 0 !important;
    }

    .leaflet-popup-tip-container { display: none; }

    .leaflet-popup-content {
      margin: 0 !important;
      width: 280px !important;
    }

    .leaflet-popup-close-button {
      color: var(--muted) !important;
      font-size: 1.2rem !important;
      padding: 10px 14px !important;
      top: 4px !important;
      right: 4px !important;
    }

    .leaflet-popup-close-button:hover { color: var(--text) !important; }

    .popup-inner {
      padding: 28px 28px 24px;
    }

    .popup-tag {
      font-size: 0.58rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      display: block;
    }

    .popup-city {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      line-height: 1.1;
      margin-bottom: 14px;
      color: #f5f5f5;
    }

    .popup-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.73rem;
      color: #9a9a9a;
      line-height: 1.85;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
    }

    .popup-year {
      display: block;
      font-size: 0.62rem;
      letter-spacing: 2px;
      color: rgba(154,154,154,0.5);
      margin-top: 14px;
      text-transform: uppercase;
    }

    /* SIDEBAR COUNT */
    .map-counter {
      position: absolute;
      bottom: 30px;
      left: 30px;
      z-index: 400;
      background: rgba(10,10,10,0.88);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      padding: 20px 28px;
      pointer-events: none;
    }

    .map-counter-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      line-height: 1;
      color: var(--accent);
    }

    .map-counter-label {
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* LIST SECTION */
    .locations-list {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 30px 120px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0;
    }

    .loc-item {
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding-right: 30px;
      padding-left: 0;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .loc-item:nth-child(odd) { padding-left: 0; }
    .loc-item:last-child, .loc-item:nth-last-child(2) { border-bottom: none; }

    .loc-item.active {
      opacity: 1;
      transform: translateY(0);
    }

    .loc-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .loc-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
    }

    .loc-year {
      font-size: 0.65rem;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .loc-country {
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      display: block;
    }

    .loc-note {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.8;
    }

    footer {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 2px;
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>

<header>
  <a class="nav-brand" href="index.html">Brian Bors</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="missions.html">Missions</a>
    <a href="allies.html">Allies</a>
    <a href="enemies.html">Enemies</a>
    <a href="locations.html" class="active">Locations</a>
    <a href="timeline.html">Chronicle</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="page-hero">
  <h1 class="page-title">LOCATIONS</h1>
  <p class="page-desc">
    Every city tells a story. Most of these stories are classified.
    The pins mark where he's been. They do not mark what happened there.
  </p>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div class="map-counter">
    <div class="map-counter-num">17</div>
    <div class="map-counter-label">Known locations</div>
  </div>
</div>

<div class="locations-list" id="loc-list"></div>

<footer>© 2026 Brian Bors Fanpage</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const locations = [
  { city: "Monaco",        country: "Monaco",         lat: 43.738,   lng: 7.424,    year: "2019", tag: "Extraction",   note: "The job that started the legend. He arrived Wednesday. By Thursday it was done. By Friday, no one could agree on what 'it' was." },
  { city: "Tokyo",         country: "Japan",           lat: 35.689,   lng: 139.692,  year: "2020", tag: "Active",       note: "Checked into the Park Hyatt under a name no one could pronounce. Checked out before dawn. Left a folded origami crane on the pillow. No one knows what it means." },
  { city: "Zurich",        country: "Switzerland",     lat: 47.376,   lng: 8.541,    year: "2021", tag: "Finance",      note: "Three bank visits in one afternoon. Different banks. Different identities. Same briefcase. The briefcase came in full. It left empty. The accounts did the opposite." },
  { city: "Nairobi",       country: "Kenya",           lat: -1.286,   lng: 36.817,   year: "2021", tag: "Classified",   note: "No record exists of his entry or exit. A local fixer was seen driving a car registered to a man who died in 1987. The case closed itself." },
  { city: "Buenos Aires",  country: "Argentina",       lat: -34.603,  lng: -58.381,  year: "2019", tag: "Classified",   note: "He ordered the same steak three nights in a row at the same restaurant. On the fourth night, the restaurant was gone. So was he." },
  { city: "Moscow",        country: "Russia",          lat: 55.751,   lng: 37.618,   year: "2018", tag: "Negotiation",  note: "Attended a meeting no one confirmed was happening. Left before it ended. The agreement was signed anyway. His name does not appear on it." },
  { city: "Marrakech",     country: "Morocco",         lat: 31.629,   lng: -7.981,   year: "2022", tag: "Recovery",     note: "Went in to retrieve one item. Retrieved four. Returned three. The fourth has not been discussed publicly or privately." },
  { city: "Singapore",     country: "Singapore",       lat: 1.352,    lng: 103.819,  year: "2020", tag: "Finance",      note: "Met with a man who does not exist on paper to arrange a transfer involving a currency that was not yet legal tender. Standard Tuesday." },
  { city: "Oslo",          country: "Norway",          lat: 59.913,   lng: 10.752,   year: "2023", tag: "Classified",   note: "Arrived during a blizzard. Departed during a blizzard. The two blizzards were three weeks apart. Local meteorologists have no comment." },
  { city: "Havana",        country: "Cuba",            lat: 23.113,   lng: -82.366,  year: "2019", tag: "Leisure",      note: "The only city he has ever returned to purely for pleasure. He drinks the same rum, sits at the same corner, tips in a currency nobody accepts. They accept it." },
  { city: "Dubai",         country: "UAE",             lat: 25.204,   lng: 55.270,   year: "2022", tag: "Meeting",      note: "Floor 87. Private elevator. Two hours. The three men who went up came down as four. Nobody saw the fourth man enter the building." },
  { city: "Tbilisi",       country: "Georgia",         lat: 41.693,   lng: 44.801,   year: "2023", tag: "Classified",   note: "The wine was excellent. Whatever else happened is not for this page." },
  { city: "Lima",          country: "Peru",            lat: -12.046,  lng: -77.042,  year: "2021", tag: "Recovery",     note: "Descended into a site that doesn't appear on any map. Re-emerged with a crate. The crate has not been opened in the presence of witnesses." },
  { city: "Reykjavik",     country: "Iceland",         lat: 64.126,   lng: -21.817,  year: "2024", tag: "Unknown",      note: "His most recent confirmed location. He was photographed once, from a distance, looking at the ocean. He has not been seen since. This is not unusual." },
  { city: "Lagos",         country: "Nigeria",         lat: 6.524,    lng: 3.379,    year: "2020", tag: "Negotiation",  note: "Brokered a deal between two parties who had been feuding for eleven years. He was in the country for six hours. He ate jollof rice. The peace held." },
  { city: "Vienna",        country: "Austria",         lat: 48.208,   lng: 16.373,   year: "2018", tag: "Cultural",     note: "Attended the opera. Left at intermission. The second act was later described by critics as 'inexplicably haunting.' Bors had nothing to say about this." },
  { city: "Macau",         country: "China SAR",       lat: 22.163,   lng: 113.543,  year: "2021", tag: "Finance",      note: "Won an undisclosed amount at a private table. Donated it entirely to a charity no one can locate. The casino has since removed that table from the floor." },
];

// Init map
const map = L.map('map', {
  center: [25, 15],
  zoom: 2,
  zoomControl: true,
  attributionControl: true,
  minZoom: 2,
  maxZoom: 10,
});

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// Custom icon
function makeIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="bors-marker"></div>',
    iconSize: [12, 12],
    iconAnchor: [6, 6],
    popupAnchor: [0, -14],
  });
}

// Add markers
locations.forEach(loc => {
  const marker = L.marker([loc.lat, loc.lng], { icon: makeIcon() }).addTo(map);

  const popupHTML = `
    <div class="popup-inner">
      <span class="popup-tag">${loc.tag}</span>
      <div class="popup-city">${loc.city}</div>
      <p class="popup-note">${loc.note}<span class="popup-year">${loc.country} — ${loc.year}</span></p>
    </div>
  `;

  marker.bindPopup(popupHTML, { maxWidth: 300, closeButton: true });
});

// Build list below map
const listEl = document.getElementById('loc-list');
locations.forEach((loc, i) => {
  const div = document.createElement('div');
  div.className = 'loc-item';
  div.innerHTML = `
    <div class="loc-item-top">
      <span class="loc-name">${loc.city}</span>
      <span class="loc-year">${loc.year}</span>
    </div>
    <span class="loc-country">${loc.country} · ${loc.tag}</span>
    <p class="loc-note">${loc.note}</p>
  `;
  listEl.appendChild(div);
});

// Scroll reveal for list
const items = document.querySelectorAll('.loc-item');
function check() {
  const trigger = window.innerHeight * 0.9;
  items.forEach((el, i) => {
    if (el.getBoundingClientRect().top < trigger) {
      setTimeout(() => el.classList.add('active'), i * 50);
    }
  });
}
window.addEventListener('scroll', check);
check();
</script>

</body>
</html>
